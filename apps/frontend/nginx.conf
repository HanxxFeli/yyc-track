# nginx.conf
# Required for React Router — without this, refreshing any page
# other than / returns a 404 because nginx looks for a real file
# at that path instead of letting React handle the routing.

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # All routes fall back to index.html so React Router can handle them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS, images) aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html — always serve fresh so new deploys take effect
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}